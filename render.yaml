services:
  - type: web
    name: asherbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GREEN_API_URL
        sync: false
      - key: GREEN_API_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: TIMEZONE
        value: Asia/Jerusalem
      - key: MAX_HISTORY
        value: "20"
      - key: DATABASE_PATH
        value: /opt/render/project/data/conversations.db
    disk:
      name: asherbot-data
      mountPath: /opt/render/project/data
      sizeGB: 1
